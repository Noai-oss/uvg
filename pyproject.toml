[project]
name = "uvg"
dynamic = ["version"]
description = "A global virtual environment manager built on top of uv"
readme = "README.md"
authors = [
    { name = "Noai-oss", email = "jiuwoxiao@outlook.com" }
]
requires-python = ">=3.12"
dependencies = [
    "typer>=0.26.1",
]

[project.scripts]
uvg = "uvg.__main__:main"

[build-system]
requires = ["hatchling", "uv-dynamic-versioning"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "uv-dynamic-versioning"

[tool.uv-dynamic-versioning]
vcs = "git"
style = "pep440"
bump = true

[tool.uv]
cache-keys = [
  { file = "pyproject.toml" },
  { git = { commit = true, tags = true } },
]

[tool.hatch.build.targets.wheel]
packages = ["src/uvg"]
artifacts = ["src/uvg/_version.py"]

[tool.hatch.build.targets.sdist]
artifacts = ["src/uvg/_version.py"]

[tool.hatch.build.hooks.version]
path = "src/uvg/_version.py"
template = '''
# This file is generated at build time. Do not edit manually.
__version__ = "{version}"
'''

[dependency-groups]
dev = [
    "git-cliff>=2.13.1",
    "pytest>=9.0.3",
    "ruff>=0.15.11",
    "ty>=0.0.31",
]
