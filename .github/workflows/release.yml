name: Release

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and Test Distributions
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      skip: ${{ steps.version.outputs.skip }}
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Extract version
        id: version
        shell: bash -e -u -o pipefail {0}
        run: |
          if [[ "$GITHUB_REF" != refs/tags/v* ]]; then
            echo "::warning::Skipping release - this workflow must run on a v* tag (got $GITHUB_REF). Use workflow_dispatch from a tag, not a branch."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          version="${GITHUB_REF#refs/tags/v}"
          tag="${GITHUB_REF#refs/tags/}"

          {
            echo "skip=false"
            echo "version=$version"
            echo "tag=$tag"
          } >> "$GITHUB_OUTPUT"

      - name: Install uv
        if: steps.version.outputs.skip != 'true'
        uses: astral-sh/setup-uv@v7

      - name: Install Python
        if: steps.version.outputs.skip != 'true'
        run: uv python install

      - name: Build distributions
        if: steps.version.outputs.skip != 'true'
        run: uv build --no-sources

      - name: Smoke test wheel
        if: steps.version.outputs.skip != 'true'
        env:
          EXPECTED_VERSION: ${{ steps.version.outputs.version }}
        run: uv run --isolated --no-project --with dist/*.whl tests/smoke_test.py

      - name: Smoke test source distribution
        if: steps.version.outputs.skip != 'true'
        env:
          EXPECTED_VERSION: ${{ steps.version.outputs.version }}
        run: uv run --isolated --no-project --with dist/*.tar.gz tests/smoke_test.py

      - name: Upload distributions
        if: steps.version.outputs.skip != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  github-release:
    name: Create GitHub Release
    needs: build
    if: needs.build.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install typos
        uses: try-chance/setup-typos@6cb948607bb29b6b2e7e89ac000a8524ca6bd862 # v0.0.1

      - name: Download distributions
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist

      - name: Generate release notes
        id: release_notes
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        continue-on-error: true
        with:
          config: cliff.toml
          args: --current --strip header
        env:
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
          OUTPUT: release-notes.md

      - name: Ensure release notes exist
        shell: bash -e -u -o pipefail {0}
        run: |
          if [[ ! -s release-notes.md ]]; then
            echo "Release ${{ needs.build.outputs.tag }}" > release-notes.md
            echo "" >> release-notes.md
            echo "See CHANGELOG.md for details." >> release-notes.md
          fi

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.build.outputs.tag }}
        shell: bash -e -u -o pipefail {0}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG" --notes-file release-notes.md
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* \
              --title "$TAG" \
              --notes-file release-notes.md \
              --verify-tag
          fi

  pypi-publish:
    name: Publish to PyPI
    needs: build
    if: needs.build.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Download distributions
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist

      - name: Publish package to PyPI
        run: uv publish dist/*
