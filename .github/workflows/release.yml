      - name: Smoke test wheel
        if: steps.version.outputs.skip != 'true'
        run: uv run --isolated --no-project --with dist/*.whl tests/smoke_test.py

      - name: Smoke test source distribution
        if: steps.version.outputs.skip != 'true'
        run: uv run --isolated --no-project --with dist/*.tar.gz tests/smoke_test.py

      - name: Upload distributions
        if: steps.version.outputs.skip != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  github-release:
    name: Create GitHub Release
    needs: build
    if: needs.build.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Download distributions
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist

      - name: Generate release notes
        env:
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash -e -u -o pipefail {0}
        run: |
          uvx --from git-cliff git-cliff \
            --current \
            --strip header \
            -o release-notes.md || {
              echo "Release ${{ needs.build.outputs.tag }}" > release-notes.md
              echo "" >> release-notes.md
              echo "See CHANGELOG.md for details." >> release-notes.md
            }

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.build.outputs.tag }}
        shell: bash -e -u -o pipefail {0}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG" --notes-file release-notes.md
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* \
              --title "$TAG" \
              --notes-file release-notes.md \
              --verify-tag
          fi

  pypi-publish:
    name: Publish to PyPI
    needs: build
    if: needs.build.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Download distributions
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist

      - name: Publish package to PyPI
        run: uv publish dist/*
