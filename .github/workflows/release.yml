name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  github-release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Validate release tag
        shell: bash -e -u -o pipefail {0}
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          project_version="$(uv version --short)"

          if [[ "$tag" == "$version" ]]; then
            echo "Release tags must start with v: ${tag}" >&2
            exit 1
          fi

          if [[ "$project_version" != "$version" ]]; then
            echo "Tag ${tag} does not match project version ${project_version}" >&2
            exit 1
          fi

      - name: Install project
        run: uv sync --locked

      - name: Run tests
        run: uv run pytest .

      - name: Build distributions
        run: uv build --no-sources

      - name: Generate release notes
        run: |
          uvx --from git-cliff git-cliff \
            --config pyproject.toml \
            --current \
            --strip header \
            -o release-notes.md

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash -e -u -o pipefail {0}
        run: |
          tag="${GITHUB_REF_NAME}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$tag" --notes-file release-notes.md
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" dist/* \
              --title "$tag" \
              --notes-file release-notes.md \
              --verify-tag
          fi

  pypi-publish:
    needs: github-release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python
        run: uv python install

      - name: Validate release tag
        shell: bash -e -u -o pipefail {0}
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          project_version="$(uv version --short)"

          if [[ "$project_version" != "$version" ]]; then
            echo "Tag ${tag} does not match project version ${project_version}" >&2
            exit 1
          fi

      - name: Build distributions
        run: uv build --no-sources

      - name: Smoke test wheel
        run: uv run --isolated --no-project --with dist/*.whl tests/smoke_test.py

      - name: Smoke test source distribution
        run: uv run --isolated --no-project --with dist/*.tar.gz tests/smoke_test.py

      - name: Publish package to PyPI
        run: uv publish
