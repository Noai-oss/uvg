name: CI Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - labeled

jobs:
  ci-test:
    if: github.event.action != 'labeled' || github.event.label.name == 'bot-run'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.1

      - name: Install Project
        run: uv sync
    
      - name: Run Pre-commit
        uses: j178/prek-action@v2.0.5

      - name: Run Tests
        run: uv run pytest .
