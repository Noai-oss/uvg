name: PR Title Check

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  check-title:
    runs-on: ubuntu-latest
    steps:
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Check PR Title
        shell: bash -e -u -o pipefail {0}
        env:
          GITHUB_PULL_REQUEST_TITLE: ${{ github.event.pull_request.title }}
        run: |
          printf '%s\n' "$GITHUB_PULL_REQUEST_TITLE" > pr_title.txt
          uvx --from git+https://github.com/ooooo-create/odev.git@113d9ddb2876046719720abbbc7b2de8af08c150 odev-commit-msg pr_title.txt
