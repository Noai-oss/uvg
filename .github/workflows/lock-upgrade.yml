name: Lock Upgrade

on:
  schedule:
    - cron: "0 0 * * 0" # every Sunday at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lock-upgrade:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Upgrade lock files
        run: uv lock --upgrade

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: uv.lock
          branch: chore/upgrade-uv-lock
          commit-message: "chore: 🔧 upgrade uv lock file"
          title: "🤖 chore: Bump `uv.lock`"
          body: |
            Automated weekly uv lock file upgrade.
          delete-branch: true
