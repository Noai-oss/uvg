name: Tag Release

on:
  pull_request:
    types: [closed]

permissions: {}

jobs:
  tag:
    name: Create Release Tag
    permissions:
      contents: write
      actions: write
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Create tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
          SHA: ${{ github.event.pull_request.merge_commit_sha }}
          REPO: ${{ github.repository }}
        shell: bash -e -u -o pipefail {0}
        run: |
          TAG="${BRANCH#release/}"
          echo "Creating tag $TAG on merge commit $SHA"

          # Verify tag doesn't already exist
          if gh api "repos/$REPO/git/refs/tags/$TAG" &>/dev/null; then
            echo "ERROR: Tag $TAG already exists"
            exit 1
          fi

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git tag -a "$TAG" "$SHA" -m "Release $TAG"
          git push origin "$TAG"

          echo "Tag $TAG created on $SHA"

      - name: Dispatch release workflow and wait
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.pull_request.merge_commit_sha }}
        shell: bash -e -u -o pipefail {0}
        run: |
          TAG="${BRANCH#release/}"
          echo "Dispatching release.yml on ref $TAG"
          gh workflow run release.yml --ref "$TAG" --repo "$REPO"

          # Wait for the run to appear, then watch it to completion
          echo "Waiting for release workflow run to appear..."
          sleep 5
          run_id=""
          for i in $(seq 1 12); do
            run_id=$(gh run list \
              --workflow=release.yml \
              --repo "$REPO" \
              --event workflow_dispatch \
              --json databaseId,headSha \
              --jq '[.[] | select(.headSha == "'"$SHA"'")] | first | .databaseId' 2>/dev/null || true)
            if [[ -n "$run_id" && "$run_id" != "null" ]]; then
              break
            fi
            echo "Waiting for run to appear (attempt $i/12)..."
            sleep 5
          done

          if [[ -z "$run_id" || "$run_id" == "null" ]]; then
            echo "::error::Could not find the release workflow run for $tag"
            exit 1
          fi

          echo "Watching release workflow run $run_id"
          gh run watch "$run_id" --repo "$REPO" --exit-status
