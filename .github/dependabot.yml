version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(deps): "
    labels:
      - "dependencies"
      - "github_actions"
    groups:
      github-actions:
        patterns:
          - "*"
  # Python
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(deps): "
    groups:
      python-packages:
        dependency-type: "development"
        patterns:
          - "*"
